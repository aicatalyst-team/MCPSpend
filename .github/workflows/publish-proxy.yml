name: Publish @mcpspend/proxy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (default: latest)'
        required: false
        default: 'latest'
  push:
    branches: [main]
    paths:
      - 'packages/proxy/**'

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    # OIDC: required for npm Trusted Publisher + provenance attestation.
    # No NPM_TOKEN needed — npm verifies the workflow identity via Sigstore.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      # Note: do NOT set registry-url here. setup-node@v4 would otherwise create
      # an .npmrc with `_authToken=${NODE_AUTH_TOKEN}` that prevents Trusted
      # Publisher OIDC from being used by `npm publish`.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # npm 11.5+ adds full Trusted Publisher (no-token) support. Node 22 ships
      # with npm 10.x, so upgrade explicitly.
      - name: Upgrade npm to >=11.5
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Read package version
        id: ver
        working-directory: packages/proxy
        run: |
          v=$(node -p "require('./package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Proxy version: $v"

      - name: Check if already published
        id: check
        working-directory: packages/proxy
        run: |
          name=$(node -p "require('./package.json').name")
          if npm view "$name@${{ steps.ver.outputs.version }}" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version ${{ steps.ver.outputs.version }} already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/proxy
        run: pnpm run build

      - name: Verify build output
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/proxy
        run: |
          if [ ! -f dist/cli.js ]; then
            echo "::error::dist/cli.js missing — build failed"
            exit 1
          fi
          head -1 dist/cli.js
          chmod +x dist/cli.js

      # Note: --provenance requires a PUBLIC GitHub repository (Sigstore verification).
      # MCPSpend is a private repo, so we publish via OIDC Trusted Publisher only.
      # When the repo eventually goes public we'll add --provenance back here.
      - name: Publish to npm (OIDC Trusted Publisher)
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/proxy
        run: |
          tag="${{ inputs.tag || 'latest' }}"
          npm publish --access public --tag "$tag"
          echo "::notice::Published @mcpspend/proxy@${{ steps.ver.outputs.version }} (tag: $tag) via OIDC"
