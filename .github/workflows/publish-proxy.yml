name: Publish @mcpspend/proxy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (default: latest)'
        required: false
        default: 'latest'
  push:
    branches: [main]
    paths:
      - 'packages/proxy/**'

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          scope: '@mcpspend'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Read package version
        id: ver
        working-directory: packages/proxy
        run: |
          v=$(node -p "require('./package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Proxy version: $v"

      - name: Check if already published
        id: check
        working-directory: packages/proxy
        run: |
          name=$(node -p "require('./package.json').name")
          if npm view "$name@${{ steps.ver.outputs.version }}" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version ${{ steps.ver.outputs.version }} already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/proxy
        run: pnpm run build

      - name: Verify build output
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/proxy
        run: |
          if [ ! -f dist/cli.js ]; then
            echo "::error::dist/cli.js missing — build failed"
            exit 1
          fi
          # Ensure the shebang is present so `mcpspend` is directly executable
          head -1 dist/cli.js
          chmod +x dist/cli.js

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/proxy
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          tag="${{ inputs.tag || 'latest' }}"
          npm publish --access public --tag "$tag"
          echo "::notice::Published @mcpspend/proxy@${{ steps.ver.outputs.version }} with tag $tag"
