name: Publish mcpspend VS Code extension

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to publish'
        required: true
        default: 'both'
        type: choice
        options: [both, vsce, ovsx, package-only]
  push:
    branches: [main]
    paths:
      # Publish on extension changes OR proxy changes, since the extension
      # bundles the proxy via esbuild — any proxy update should reach users
      # through a fresh .vsix. The job has an "already published" guard, so a
      # proxy commit that doesn't bump the extension version is a no-op.
      - 'packages/vscode-extension/**'
      - 'packages/proxy/**'

jobs:
  publish:
    name: Build & publish extension
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Build proxy (extension bundles its dist)
        working-directory: packages/proxy
        run: pnpm run build

      - name: Build extension
        working-directory: packages/vscode-extension
        run: pnpm run build

      - name: Read extension version
        id: ver
        working-directory: packages/vscode-extension
        run: |
          v=$(node -p "require('./package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      # Skip the publish (but still build + upload artifact) when this exact
      # version is already on Open VSX. Otherwise vsce/ovsx would fail with
      # "already exists" and we'd see workflow noise on every proxy commit
      # that didn't bump the extension.
      - name: Check if already on Open VSX
        id: ovsx_check
        run: |
          if curl -s -o /dev/null -w "%{http_code}" "https://open-vsx.org/api/mcpspend/mcpspend-vscode/${{ steps.ver.outputs.version }}" | grep -q '^200$'; then
            echo "skip_ovsx=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Extension ${{ steps.ver.outputs.version }} already on Open VSX — skipping ovsx publish"
          else
            echo "skip_ovsx=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package .vsix
        working-directory: packages/vscode-extension
        run: pnpm run package

      - name: Upload .vsix as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpspend-vscode-${{ steps.ver.outputs.version }}.vsix
          path: packages/vscode-extension/*.vsix

      - name: Publish to VS Code Marketplace
        if: github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'vsce'
        working-directory: packages/vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::warning::VSCE_PAT not set — skipping Marketplace publish"
          else
            pnpm dlx @vscode/vsce publish --no-dependencies --pat "$VSCE_PAT" --packagePath *.vsix
          fi

      - name: Publish to Open VSX (Cursor + Windsurf use this)
        if: steps.ovsx_check.outputs.skip_ovsx != 'true' && (github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'ovsx')
        working-directory: packages/vscode-extension
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::warning::OVSX_PAT not set — skipping Open VSX publish"
          else
            pnpm dlx ovsx publish --no-dependencies --pat "$OVSX_PAT" *.vsix
          fi
