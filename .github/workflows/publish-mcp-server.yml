name: Publish @mcpspend/mcp-server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/mcp-server/**'

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Read version
        id: ver
        working-directory: packages/mcp-server
        run: |
          v=$(node -p "require('./package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Check if already published
        id: check
        working-directory: packages/mcp-server
        run: |
          if npm view "@mcpspend/mcp-server@${{ steps.ver.outputs.version }}" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/mcp-server
        run: pnpm run build

      - name: Make bin executable
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/mcp-server
        run: |
          chmod +x dist/index.js
          head -1 dist/index.js

      - name: Publish to npm (NPM_TOKEN)
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      # ────────────────────────────────────────────────────────────
      # MCP Registry — publish server.json so the package shows up
      # in the official catalog at registry.modelcontextprotocol.io.
      # Always runs (even on a skip-publish) so a fix to server.json
      # alone (no version bump) still propagates to the registry.
      # GitHub OIDC token replaces the manual `mcp-publisher login
      # github` device-flow (`id-token: write` permission above).
      # ────────────────────────────────────────────────────────────
      - name: Wait for npm to index new version
        if: steps.check.outputs.skip != 'true'
        run: sleep 30

      - name: Install mcp-publisher CLI
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --help | head -5

      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json to MCP Registry
        working-directory: packages/mcp-server
        run: ../../mcp-publisher publish

      - name: Verify registry entry
        run: |
          sleep 5
          curl -s "https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.andreisirbu91-lab/mcpspend" \
            | head -c 1500
          echo ""
