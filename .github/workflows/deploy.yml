name: Deploy to Production

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Trigger Coolify deploy — API
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for attempt in 1 2 3; do
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
              -L 18000:localhost:8000 -N -f \
              root@${{ secrets.COOLIFY_HOST }} && break
            echo "SSH attempt $attempt failed, retrying..."
            sleep 5
          done
          sleep 2
          response=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
            "http://localhost:18000/api/v1/deploy?uuid=${{ secrets.COOLIFY_API_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
          echo "Coolify API response: $response"
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "Deploy trigger failed with HTTP $response"
            exit 1
          fi

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Trigger Coolify deploy — Worker
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for attempt in 1 2 3; do
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
              -L 18000:localhost:8000 -N -f \
              root@${{ secrets.COOLIFY_HOST }} && break
            echo "SSH attempt $attempt failed, retrying..."
            sleep 5
          done
          sleep 2
          response=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
            "http://localhost:18000/api/v1/deploy?uuid=${{ secrets.COOLIFY_WORKER_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
          echo "Coolify Worker response: $response"
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "Deploy trigger failed with HTTP $response"
            exit 1
          fi

  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Trigger Coolify deploy — Dashboard
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for attempt in 1 2 3; do
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
              -L 18000:localhost:8000 -N -f \
              root@${{ secrets.COOLIFY_HOST }} && break
            echo "SSH attempt $attempt failed, retrying..."
            sleep 5
          done
          sleep 2
          response=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
            "http://localhost:18000/api/v1/deploy?uuid=${{ secrets.COOLIFY_DASHBOARD_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
          echo "Coolify Dashboard response: $response"
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "Deploy trigger failed with HTTP $response"
            exit 1
          fi

  notify:
    name: Deploy complete
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-worker, deploy-dashboard]
    if: always()
    steps:
      - name: Status
        run: |
          echo "API: ${{ needs.deploy-api.result }}"
          echo "Worker: ${{ needs.deploy-worker.result }}"
          echo "Dashboard: ${{ needs.deploy-dashboard.result }}"
