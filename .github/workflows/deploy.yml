name: Deploy to Production

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Trigger Coolify deploy — API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "http://${{ secrets.COOLIFY_HOST }}:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_API_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "Coolify API response: $response"
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "Deploy trigger failed with HTTP $response"
            exit 1
          fi

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Trigger Coolify deploy — Worker
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "http://${{ secrets.COOLIFY_HOST }}:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_WORKER_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "Coolify Worker response: $response"
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "Deploy trigger failed with HTTP $response"
            exit 1
          fi

  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Trigger Coolify deploy — Dashboard
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "http://${{ secrets.COOLIFY_HOST }}:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_DASHBOARD_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "Coolify Dashboard response: $response"
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "Deploy trigger failed with HTTP $response"
            exit 1
          fi

  notify:
    name: Deploy complete
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-worker, deploy-dashboard]
    if: always()
    steps:
      - name: Status
        run: |
          echo "API: ${{ needs.deploy-api.result }}"
          echo "Worker: ${{ needs.deploy-worker.result }}"
          echo "Dashboard: ${{ needs.deploy-dashboard.result }}"
