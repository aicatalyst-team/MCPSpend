name: Deploy to Production

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

# Why this changed (2026-05-23): SSH tunnels from GH Actions runners to our
# VPS port 22 started timing out intermittently (firewall / rate limit on the
# host). The new path POSTs to /api/internal/redeploy on api.mcpspend.com,
# which proxies the call to Coolify on the internal Docker network. No
# inbound port 22 needed. Authentication is a shared secret (DEPLOY_SECRET).

jobs:
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Trigger Coolify deploy — API
        run: |
          for attempt in 1 2 3 4 5; do
            response=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 30 -X POST \
              "https://api.mcpspend.com/api/internal/redeploy" \
              -H "X-Deploy-Token: ${{ secrets.DEPLOY_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '{"uuid":"${{ secrets.COOLIFY_API_UUID }}"}' || echo "000")
            echo "API attempt $attempt: $response"
            cat /tmp/body 2>/dev/null
            if [ "$response" = "200" ]; then exit 0; fi
            echo "Retrying in 20s (webhook may be restarting)..."
            sleep 20
          done
          echo "Webhook never returned 200 after 5 attempts"
          exit 1

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    # Wait for API to land first — the webhook lives on api.mcpspend.com, so
    # if all three deploys ran in parallel the worker/dashboard jobs would
    # POST while the API container is restarting (curl exit code 28). Adding
    # `needs: deploy-api` serialises them and avoids the flaky deploy chain.
    needs: [ci, deploy-api]
    steps:
      - name: Trigger Coolify deploy — Worker
        run: |
          for attempt in 1 2 3 4 5; do
            response=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 30 -X POST \
              "https://api.mcpspend.com/api/internal/redeploy" \
              -H "X-Deploy-Token: ${{ secrets.DEPLOY_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '{"uuid":"${{ secrets.COOLIFY_WORKER_UUID }}"}' || echo "000")
            echo "Worker attempt $attempt: $response"
            cat /tmp/body 2>/dev/null
            if [ "$response" = "200" ]; then exit 0; fi
            sleep 20
          done
          exit 1

  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: [ci, deploy-api]
    steps:
      - name: Trigger Coolify deploy — Dashboard
        run: |
          for attempt in 1 2 3 4 5; do
            response=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 30 -X POST \
              "https://api.mcpspend.com/api/internal/redeploy" \
              -H "X-Deploy-Token: ${{ secrets.DEPLOY_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '{"uuid":"${{ secrets.COOLIFY_DASHBOARD_UUID }}"}' || echo "000")
            echo "Dashboard attempt $attempt: $response"
            cat /tmp/body 2>/dev/null
            if [ "$response" = "200" ]; then exit 0; fi
            sleep 20
          done
          exit 1

  notify:
    name: Deploy complete
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-worker, deploy-dashboard]
    if: always()
    steps:
      - name: Status
        run: |
          echo "API: ${{ needs.deploy-api.result }}"
          echo "Worker: ${{ needs.deploy-worker.result }}"
          echo "Dashboard: ${{ needs.deploy-dashboard.result }}"
