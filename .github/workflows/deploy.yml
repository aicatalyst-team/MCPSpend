name: Deploy to Production

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

# Why: SSH tunnels from GH Actions runners to our VPS port 22 started timing
# out intermittently. The new path POSTs to /api/internal/redeploy on
# api.mcpspend.com, which proxies the call to Coolify on the internal Docker
# network. No inbound port 22 needed. Authentication is a shared secret
# (DEPLOY_SECRET).
#
# Each job uses `shell: bash {0}` to disable the default `bash -eo pipefail`
# wrapping — that wrapping killed the retry loop on the first failed curl
# (set -e exited the script before the `done`). With plain bash, the loop
# survives transient 5xx / timeouts long enough for the API to come back up
# after its own restart.

jobs:
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Trigger Coolify deploy — API
        shell: bash {0}
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
          UUID: ${{ secrets.COOLIFY_API_UUID }}
        run: |
          ok=0
          for attempt in 1 2 3 4 5 6; do
            code=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 30 -X POST \
              "https://api.mcpspend.com/api/internal/redeploy" \
              -H "X-Deploy-Token: $DEPLOY_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"uuid\":\"$UUID\"}")
            echo "API attempt $attempt: code=$code"
            head -c 400 /tmp/body 2>/dev/null
            echo ""
            if [ "$code" = "200" ]; then ok=1; break; fi
            echo "Retrying in 25s (webhook may be restarting)..."
            sleep 25
          done
          if [ "$ok" != "1" ]; then
            echo "::error::API webhook never returned 200 after 6 attempts"
            exit 1
          fi

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: [ci, deploy-api]
    steps:
      - name: Trigger Coolify deploy — Worker
        shell: bash {0}
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
          UUID: ${{ secrets.COOLIFY_WORKER_UUID }}
        run: |
          ok=0
          for attempt in 1 2 3 4 5 6; do
            code=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 30 -X POST \
              "https://api.mcpspend.com/api/internal/redeploy" \
              -H "X-Deploy-Token: $DEPLOY_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"uuid\":\"$UUID\"}")
            echo "Worker attempt $attempt: code=$code"
            head -c 400 /tmp/body 2>/dev/null
            echo ""
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 25
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Worker webhook never returned 200 after 6 attempts"
            exit 1
          fi

  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: [ci, deploy-api]
    steps:
      - name: Trigger Coolify deploy — Dashboard
        shell: bash {0}
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
          UUID: ${{ secrets.COOLIFY_DASHBOARD_UUID }}
        run: |
          ok=0
          for attempt in 1 2 3 4 5 6; do
            code=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 30 -X POST \
              "https://api.mcpspend.com/api/internal/redeploy" \
              -H "X-Deploy-Token: $DEPLOY_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"uuid\":\"$UUID\"}")
            echo "Dashboard attempt $attempt: code=$code"
            head -c 400 /tmp/body 2>/dev/null
            echo ""
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 25
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Dashboard webhook never returned 200 after 6 attempts"
            exit 1
          fi

  notify:
    name: Deploy complete
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-worker, deploy-dashboard]
    if: always()
    steps:
      - name: Status
        run: |
          echo "API: ${{ needs.deploy-api.result }}"
          echo "Worker: ${{ needs.deploy-worker.result }}"
          echo "Dashboard: ${{ needs.deploy-dashboard.result }}"
