# Smithery deployment config.
#
# This file tells Smithery how to host the MCPSpend MCP server when a user
# selects the "Smithery hosted" option (run.tools URL). For self-hosted
# users this file has no effect — they just `npx -y @mcpspend/mcp-server`
# locally and we never touch their machine.
#
# https://smithery.ai/docs/build/deployments

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - mcpspendApiKey
    properties:
      mcpspendApiKey:
        type: string
        title: MCPSpend API key
        description: >
          Your MCPSpend API key. Get one at https://mcpspend.com/dashboard/keys.
          Starts with mcps_live_ or mcps_test_.
        format: password
      mcpspendEndpoint:
        type: string
        title: API endpoint
        description: >
          Optional. Defaults to https://api.mcpspend.com. Override only if you're
          self-hosting MCPSpend.
        default: https://api.mcpspend.com
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@mcpspend/mcp-server@latest'],
      env: {
        MCPSPEND_API_KEY: config.mcpspendApiKey,
        MCPSPEND_ENDPOINT: config.mcpspendEndpoint || 'https://api.mcpspend.com',
      },
    })

build:
  # @mcpspend/mcp-server is pulled from npm on demand. No build step needed.
  dockerfile: |
    FROM node:22-alpine
    WORKDIR /app
    # npx will fetch @mcpspend/mcp-server at runtime via commandFunction.
    # Pre-warm the cache so first-call latency is acceptable.
    RUN npx -y @mcpspend/mcp-server@latest --help 2>/dev/null || true
    ENTRYPOINT ["sh", "-c"]
    CMD ["npx -y @mcpspend/mcp-server@latest"]

# Smithery listing metadata. These render as chips above the fold on the
# server's catalog page — they boost click-through and help discovery.
useCases:
  - Ask "what did my AI agents cost today?" from any MCP client
  - Find which MCP tools are eating your token budget
  - Drill into a specific agent session by ID
  - Monitor month-to-date spend against your plan limit or custom budget
  - Compare cost across Cursor / Claude Desktop / Windsurf / VS Code

# Try the server WITHOUT an API key by calling the public `try_demo` tool.
# This lowers onboarding friction for catalog browsers.
exampleConfigs:
  - title: Preview (no key required)
    description: Call try_demo to see what the output looks like before signing up.
    config:
      mcpspendApiKey: ""
  - title: Self-hosted MCPSpend
    description: Point at your own deployment instead of api.mcpspend.com.
    config:
      mcpspendApiKey: mcps_live_your_key_here
      mcpspendEndpoint: https://mcpspend.your-domain.com
