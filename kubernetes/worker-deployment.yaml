apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: autopoc-mcpspend
  labels:
    app: worker
    autopoc.io/project: mcpspend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: quay.io/aicatalyst/mcpspend-worker:latest
          imagePullPolicy: Always
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mcpspend-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: mcpspend-secrets
                  key: REDIS_URL
            - name: APP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: mcpspend-secrets
                  key: APP_ENCRYPTION_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "125m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL