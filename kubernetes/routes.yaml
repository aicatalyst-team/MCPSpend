apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dashboard
  namespace: autopoc-mcpspend
  labels:
    app: dashboard
    autopoc.io/project: mcpspend
spec:
  to:
    kind: Service
    name: dashboard
  port:
    targetPort: 3000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: api
  namespace: autopoc-mcpspend
  labels:
    app: api
    autopoc.io/project: mcpspend
spec:
  to:
    kind: Service
    name: api
  port:
    targetPort: 4000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect